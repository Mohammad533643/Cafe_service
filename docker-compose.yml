services:
  mysql:
    image: mysql:latest
    container_name: cafe_database

    restart: unless-stopped

    env_file:
      - .env

    environment:
      MYSQL_DATABASE: cafe_service_db
      MYSQL_USER: cafe_user
      MYSQL_PASSWORD: Cafe_root_1234
      MYSQL_ROOT_PASSWORD: Root_Service_1234
    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  backend:                         
    build:
      context: ./Backend/cafe_backend
      dockerfile: Dockerfile
    container_name: cafe_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/Backend/cafe_backend:/app #very important
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mysql
    environment:
      MYSQL_HOST: mysql

  frontend:
    build:
      context: ./Frontend/cafe_frontend
      dockerfile: Dockerfile
    container_name: cafe_frontend
    volumes:
      - ./Frontend/cafe_frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
volumes:
  mysql_data:
